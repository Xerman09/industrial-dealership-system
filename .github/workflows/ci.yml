name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: # <--- Adds a "Run workflow" button in GitHub

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npx eslint . --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8055
          NEXT_PUBLIC_DIRECTUS_URL: http://localhost:8055
          DIRECTUS_STATIC_TOKEN: placeholder
          DIRECTUS_TOKEN: placeholder
          NEXT_PUBLIC_DIRECTUS_STATIC_TOKEN: placeholder

  deploy:
    name: Deploy to Vertex Server
    needs: ci 
    # This rule allows both code pushes AND manual button clicks!
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: self-hosted 

    steps:
      - name: Execute Deployment Script
        run: |
          /home/vertex-dev/system/ids_system/deploy.sh